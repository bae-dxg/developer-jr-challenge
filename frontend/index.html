<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-container">
        <header>
            <h1>tareas</h1>
            <div class="stats">
                <span class="pill">✓ <span id="task-count">0</span></span>
            </div>
        </header>

        <section class="task-list">
            <p class="section-title">mis tareas</p> 
            <div id="tasks-container">
                </div>
        </section>

        <button id="fab-btn" class="fab">+</button>

        <div id="form-overlay" class="overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h2>nueva tarea</h2>
                    <button id="close-modal-btn" class="close-btn">✕</button>
                </div>
                <form id="task-form" class="add-task-form">
                    <input type="text" id="title" placeholder="añade un titulo" required autocomplete="off">
                    <input type="text" id="description" placeholder="añade una descripción..." required autocomplete="off">
                    <button type="submit">guardar</button>
                </form>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
